name: Release

on:
  push:
    tags: ["v*.*.*-alpha.*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: test "v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" = "$GITHUB_REF_NAME"
      - run: cargo build --locked --release
      - run: scripts/disposable-e2e.sh
      - run: scripts/package-release.sh
        env:
          CODEX_REHOME_TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --title "Codex Rehome $GITHUB_REF_NAME"
          --notes-file ".github/release-notes/$GITHUB_REF_NAME.md"
          --prerelease --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
